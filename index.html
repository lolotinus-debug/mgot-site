<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macgyver Official Token (MGOT)</title>

<style>
:root{
--bg:#030614;
--card:rgba(255,255,255,0.04);
--neon:#00ffa3;
--text:#eaeaea;
--muted:#9aa4b2;
}

body{
margin:0;
font-family:Arial;
background:#040712;
color:var(--text);
}

.topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:8px;
font-size:12px;
background:#050a18;
color:var(--muted);
z-index:999;
}

.live{color:var(--neon);animation:pulse 1.5s infinite;}
@keyframes pulse{0%{opacity:1;}50%{opacity:.3;}100%{opacity:1;}}

header{
margin-top:35px;
display:flex;
justify-content:space-between;
padding:15px;
background:#050a18;
}

.logo{color:var(--neon);font-weight:bold;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid rgba(0,255,163,0.15);
}

.bar{height:8px;background:#111;border-radius:10px;}
.fill{height:100%;background:var(--neon);}

iframe{width:100%;height:500px;border:0;border-radius:10px;}

.btn{
display:inline-block;
padding:12px 18px;
background:var(--neon);
color:#000;
font-weight:bold;
border-radius:10px;
text-decoration:none;
margin:5px;
}

</style>
</head>

<body>

<div class="topbar">
<span class="live">● LIVE</span>
<span id="price">PRICE: ...</span>
<span id="mc">MCAP: ...</span>
<span id="liq">LIQ: ...</span>
<span id="vol">VOL: ...</span>
</div>

<header>
<div class="logo">MACGYVER OFFICIAL TOKEN (MGOT)</div>
</header>

<!-- CHART -->
<div style="padding:20px;">
<iframe src="https://dexscreener.com/solana/coro6hs7af1w7qcpmn5qsif83zswzv6e3e6badpzkqom?embed=1"></iframe>
</div>

<!-- WALLETS -->
<section class="grid">

<div class="card">
<h3>Community</h3>
<p>40%</p>
<div class="bar"><div class="fill" style="width:40%"></div></div>
</div>

<div class="card">
<h3>Liquidity Pool</h3>
<p>35%</p>
<div class="bar"><div class="fill" style="width:35%"></div></div>
</div>

<div class="card">
<h3>Treasury</h3>
<p>15%</p>
<div class="bar"><div class="fill" style="width:15%"></div></div>
</div>

<div class="card">
<h3>Marketing</h3>
<p>7%</p>
<div class="bar"><div class="fill" style="width:7%"></div></div>
</div>

<div class="card">
<h3>Team</h3>
<p>3%</p>
<div class="bar"><div class="fill" style="width:3%"></div></div>
</div>

</section>

<!-- HOLDERS -->
<section class="grid">

<div class="card">
<h3>Holders</h3>
<p id="holders">Loading...</p>
</div>

<div class="card">
<h3>Top Holders</h3>
<ul id="topHolders"></ul>
</div>

</section>

<!-- TRANSACTIONS -->
<section class="grid">
<div class="card">
<h3>Latest Trades</h3>
<ul id="txs"></ul>
</div>
</section>

<!-- CTA -->
<div style="text-align:center;padding:30px;">
<a class="btn" href="https://raydium.io/swap/?inputCurrency=sol&outputCurrency=coro6hs7af1w7qcpmn5qsif83zswzv6e3e6badpzkqom">BUY MGOT</a>
</div>

<script>
const pair="coro6hs7af1w7qcpmn5qsif83zswzv6e3e6badpzkqom";

// DEX DATA
async function loadDex(){
const r=await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${pair}`);
const d=await r.json();
const p=d.pairs[0];

document.getElementById("price").innerText="PRICE: $"+p.priceUsd;
document.getElementById("mc").innerText="MCAP: $"+(p.fdv||"n/a");
document.getElementById("liq").innerText="LIQ: $"+p.liquidity.usd;
document.getElementById("vol").innerText="VOL: $"+p.volume.h24;
}

// HOLDERS (Solscan unofficial)
async function loadHolders(){
try{
const r=await fetch(`https://public-api.solscan.io/token/holders?tokenAddress=${pair}&limit=5`);
const d=await r.json();

document.getElementById("holders").innerText=d.total;

let html="";
d.data.forEach(w=>{
html+=`<li>${w.owner.slice(0,6)}... (${(w.amount/1e6).toFixed(2)})</li>`;
});
document.getElementById("topHolders").innerHTML=html;
}catch(e){}
}

// TXS (Dexscreener trades)
async function loadTx(){
const r=await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${pair}`);
const d=await r.json();
const trades=d.pairs[0].txns.h1;

document.getElementById("txs").innerHTML=`
<li>Buys: ${trades.buys}</li>
<li>Sells: ${trades.sells}</li>
`;
}

// INIT
loadDex();
loadHolders();
loadTx();

setInterval(loadDex,10000);
setInterval(loadHolders,20000);
setInterval(loadTx,10000);
</script>

</body>
</html>
