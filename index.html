<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MGOT</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: monospace;
  color: #d1d5db;
  overflow-x: hidden;
  background: #05070d;
}

/* ===== FUTURISTIC MACGYVER BACKGROUND ===== */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;

  background: radial-gradient(circle at 20% 20%, #0b2a3d, transparent 40%),
              radial-gradient(circle at 80% 30%, #1a0f2e, transparent 45%),
              radial-gradient(circle at 50% 80%, #0a1f1a, transparent 50%),
              #05070d;

  animation: bgMove 12s ease-in-out infinite alternate;
}

.bg::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(56,189,248,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.25;
}

.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 40%, rgba(34,197,94,0.08), transparent 25%),
              radial-gradient(circle at 70% 60%, rgba(56,189,248,0.08), transparent 30%),
              radial-gradient(circle at 50% 20%, rgba(168,85,247,0.06), transparent 35%);
  animation: floatGlow 10s infinite alternate;
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
  z-index: -1;
  pointer-events: none;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 850px;
  margin: auto;
  padding: 40px;
}

/* ===== TITLE ===== */
h1 {
  font-size: 55px;
  color: white;
  text-align: center;
  letter-spacing: 6px;
  text-shadow: 0 0 25px rgba(56,189,248,0.25);
  animation: flicker 3s infinite;
}

p {
  text-align: center;
  color: #9ca3af;
}

/* ===== BLOCKS ===== */
.block {
  background: rgba(15, 23, 42, 0.75);
  border: 1px solid #1f2937;
  padding: 18px;
  margin: 18px 0;
  border-radius: 12px;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 15px rgba(56,189,248,0.08);
}

/* ===== GREEN ===== */
.green {
  color: #22c55e;
}

/* ===== LINKS ===== */
a {
  color: #38bdf8;
  display: block;
  margin: 6px 0;
  text-decoration: none;
  transition: 0.2s;
}

a:hover {
  color: #ffffff;
  text-shadow: 0 0 10px #38bdf8;
}

/* ===== ANIMATIONS ===== */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.85; }
  100% { opacity: 1; }
}

@keyframes bgMove {
  0% { filter: hue-rotate(0deg) brightness(1); }
  100% { filter: hue-rotate(20deg) brightness(1.2); }
}

@keyframes floatGlow {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-20px); }
}

</style>
</head
