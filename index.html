<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGOT | Dark Neon Solana V2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a0f1f, #000);
      color: #fff;
      overflow-x: hidden;
    }

    .glow {
      color: #00ffa3;
      text-shadow: 0 0 10px #00ffa3, 0 0 20px #00ffa3;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      border-bottom: 1px solid #111;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    .sub {
      color: #aaa;
      margin-top: 10px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    .hero img {
      width: 220px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,255,163,0.3);
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,255,163,0.2);
      border-radius: 16px;
      padding: 20px;
      margin: 20px;
      max-width: 800px;
    }

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
